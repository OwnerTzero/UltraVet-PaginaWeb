# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR WEB
# ===================================================================
server.port=8080
spring.application.name=ultravet-veterinaria

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ultravet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE (CODE-FIRST)
# ===================================================================
# El modo 'update' crea las tablas si no existen en MySQL y no borra tus datos previos 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# ===================================================================
# CONFIGURACIÓN DE THYMELEAF
# ===================================================================
# Desactivamos el cache para ver cambios en los HTML al instante sin reiniciar el servidor
spring.thymeleaf.cache=false

# ===================================================================
# CONFIGURACION DE JWT (API REST protegida con JSON Web Token)
# ===================================================================
# En produccion este secreto deberia venir desde una variable de entorno.
jwt.secret=8f426d1b1e6c4a2ea1a1f3f8b9c7d6e5a4b3c2d1e0f9a8b7c6d5e4f3a2b1c0d9
jwt.expiration-ms=3600000
